<section id="loterias" class="lottery-section">
  <div class="lottery-section__container">
    <h2 class="lottery-section__title">
      Elige tu juego y prueba tu
      <span class="lottery-section__title--highlight">suerte</span>
    </h2>

    <div class="lottery-section__hero">
      <app-lottery-card variant="hero"></app-lottery-card>
    </div>

    <div class="lottery-section__cards">
      <app-lottery-card variant="kabala"></app-lottery-card>

      <app-lottery-card variant="ganadiario"></app-lottery-card>

      <app-lottery-card variant="kinelo"></app-lottery-card>

      <app-lottery-card variant="rapitinka"></app-lottery-card>
    </div>
  </div>
  <!-- Banner -->
  <div class="lottery-section__banner">
    <app-lottery-banner></app-lottery-banner>
  </div>
  <div id="videoloterias" class="lottery-section__video">
    <app-lottery-video-section></app-lottery-video-section>
  </div>
</section>
