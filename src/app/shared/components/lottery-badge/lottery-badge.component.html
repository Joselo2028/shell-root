<div
  class="lottery-badge"
  [class.lottery-badge--card]="variant() === 'card'"
  [class.lottery-badge--card-light]="variant() === 'card-light'"
  [class.lottery-badge--result]="variant() === 'result'"
  [class.lottery-badge--result-purple]="variant() === 'result-purple'"
>
  @if (icon()) {
    <img class="lottery-badge__icon" [src]="icon()!" alt="" />
  }

  <span class="lottery-badge__text">
    {{ text() }}
  </span>
</div>
