<div class="lottery-video-section">
  <h2 class="lottery-video-section__title">Más juegos para ti</h2>

  <div class="lottery-video-section__card">
    <div class="lottery-video-section__container">
      <img
        src="assets/images/logo-videoloterias.svg"
        alt="Video Loterías"
        class="lottery-video-section__logo"
      />

      <div class="lottery-video-section__body">
        <div class="lottery-video-section__header">
          <p class="lottery-video-section__subtitle">
            Juega y gana al instante hasta
            <span>S/100,000</span>
          </p>

          <app-button label="Ver más" variant="outline"> </app-button>
        </div>

        <div class="lottery-video-section__carousel">
          <button
            type="button"
            class="lottery-video-section__arrow lottery-video-section__arrow--left"
            aria-label="Ver juegos anteriores"
            (click)="scrollPrevious()"
          >
            ‹
          </button>

          <div #carousel class="lottery-video-section__viewport">
            <div class="lottery-video-section__track">
              @for (game of games; track $index) {
                <button
                  type="button"
                  class="lottery-video-section__game"
                  [attr.aria-label]="'Abrir ' + game.name"
                >
                  <img
                    [src]="game.image"
                    [alt]="game.name"
                    class="lottery-video-section__game-image"
                  />
                </button>
              }
            </div>
          </div>

          <button
            type="button"
            class="lottery-video-section__arrow lottery-video-section__arrow--right"
            aria-label="Ver más juegos"
            (click)="scrollNext()"
          >
            ›
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
