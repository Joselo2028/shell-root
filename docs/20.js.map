<section id="promociones" class="promotions">
  <div class="promotions__container">
    <img src="assets/images/bolilla_8.svg" alt="" class="promotions__ball" />

    <div class="promotions__header">
      <h2 class="promotions__title">Promociones</h2>

      <app-button label="Ver más" variant="outline"> </app-button>
    </div>

    <div class="promotions__cards">
      <!-- Card 1 -->
      <article class="promotion-card">
        <div class="promotion-card__content">
          <h3 class="promotion-card__title">
            Combos<br />
            Loteros
          </h3>

          <app-button label="Jugar ahora" variant="danger"> </app-button>
        </div>
      </article>

      <!-- Card 2 -->
      <article class="promotion-card">
        <div class="promotion-card__content">
          <h3 class="promotion-card__title">
            Suscripción<br />
            de loterías
          </h3>

          <app-button label="Jugar ahora" variant="danger"> </app-button>
        </div>
      </article>

      <!-- Card 3 -->
      <article class="promotion-card">
        <div class="promotion-card__content">
          <h3 class="promotion-card__title promotion-card__title--large">3x2</h3>

          <app-button label="Jugar ahora" variant="danger"> </app-button>
        </div>
      </article>
    </div>
  </div>
</section>
