<section id="ganadores" class="winners">
  <div class="winners__container">
    <!-- Título -->

    <div class="winners__heading">
      <h2 class="winners__title">Conoce a quienes ya <span>ganaron</span></h2>

      <p class="winners__description">
        Miles de personas ya han ganado con La Tinka. Aquí te mostramos algunos de ellos.
      </p>
    </div>

    <!-- Botón -->

    <div class="winners__actions">
      <app-button label="Ver más" variant="outline"> </app-button>
    </div>

    <!-- Cards -->

    <div class="winners__cards">
      <app-winner-card
        variant="kabala"
        lottery="Kábala"
        winnerName="H. Ganó"
        prize="S/ 5,000"
        city="Lima"
      >
      </app-winner-card>

      <app-winner-card
        variant="tinka"
        lottery="Tinka"
        winnerName="H. Ganó"
        prize="S/ 5,000"
        city="Arequipa"
      >
      </app-winner-card>

      <app-winner-card
        variant="ganadiario"
        lottery="Gana Diario"
        winnerName="H. Ganó"
        prize="S/ 5,000"
        city="Piura"
      >
      </app-winner-card>
    </div>
  </div>
</section>
